<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Info</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1f1f1f; --sub: #787774; --accent: #2e7cd6; --line: #ededec;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #191919; --fg: #ececec; --sub: #9b9b9b; --accent: #5a9fe2; --line: #2c2c2c; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .card { width: 100%; max-width: 320px; padding: 14px 18px; }
  .label { font-size: 12px; letter-spacing: 2px; color: var(--sub); margin-bottom: 8px; text-align: center; }
  .row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 14px;
  }
  .row:last-child { border-bottom: none; }
  .k { color: var(--sub); }
  .v { font-weight: 600; font-variant-numeric: tabular-nums; }
  .v small { font-weight: 400; color: var(--sub); font-size: 11px; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">이번 주 정보</div>
    <div class="row"><span class="k">서울 날씨</span><span class="v" id="wx">-</span></div>
    <div class="row"><span class="k">USD/KRW</span><span class="v" id="usd">-</span></div>
    <div class="row"><span class="k">THB/KRW</span><span class="v" id="thb">-</span></div>
    <div class="row"><span class="k">BTC</span><span class="v" id="btc">-</span></div>
  </div>
<script>
  var WMO = {0:"맑음",1:"대체로 맑음",2:"구름 조금",3:"흐림",45:"안개",48:"안개",51:"이슬비",53:"이슬비",55:"이슬비",
    61:"비",63:"비",65:"강한 비",66:"진눈깨비",67:"진눈깨비",71:"눈",73:"눈",75:"폭설",77:"싸락눈",
    80:"소나기",81:"소나기",82:"강한 소나기",85:"눈",86:"폭설",95:"뇌우",96:"뇌우",99:"뇌우"};
  function setText(id, t) { document.getElementById(id).innerHTML = t; }

  function loadWeather() {
    fetch("https://api.open-meteo.com/v1/forecast?latitude=37.57&longitude=126.98&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul&forecast_days=1")
      .then(function(r){ return r.json(); })
      .then(function(d){
        var cur = d.current, day = d.daily;
        var desc = WMO[cur.weather_code] || "-";
        setText("wx", desc + " " + Math.round(cur.temperature_2m) + "&deg; <small>" +
          Math.round(day.temperature_2m_min[0]) + "&deg; / " + Math.round(day.temperature_2m_max[0]) + "&deg;</small>");
      }).catch(function(){ setText("wx", "-"); });
  }
  function loadFx() {
    fetch("https://open.er-api.com/v6/latest/USD")
      .then(function(r){ return r.json(); })
      .then(function(d){
        var krw = d.rates.KRW, thb = d.rates.THB;
        setText("usd", Math.round(krw).toLocaleString() + " <small>원</small>");
        setText("thb", (krw / thb).toFixed(1) + " <small>원</small>");
      }).catch(function(){ setText("usd", "-"); setText("thb", "-"); });
  }
  function loadBtc() {
    fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT")
      .then(function(r){ return r.json(); })
      .then(function(d){ setText("btc", "$" + Math.round(parseFloat(d.price)).toLocaleString()); })
      .catch(function(){
        fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd")
          .then(function(r){ return r.json(); })
          .then(function(d){ setText("btc", "$" + Math.round(d.bitcoin.usd).toLocaleString()); })
          .catch(function(){ setText("btc", "-"); });
      });
  }
  function loadAll() { loadWeather(); loadFx(); loadBtc(); }
  loadAll();
  setInterval(loadAll, 10 * 60 * 1000);
</script>
</body>
</html>
