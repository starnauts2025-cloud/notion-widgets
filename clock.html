<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clock</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1f1f1f; --sub: #787774; --accent: #2e7cd6;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #191919; --fg: #ececec; --sub: #9b9b9b; --accent: #5a9fe2; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .card { text-align: center; padding: 16px; }
  .label { font-size: 12px; letter-spacing: 2px; color: var(--sub); margin-bottom: 6px; }
  .time { font-size: 56px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .time .sec { font-size: 28px; font-weight: 500; color: var(--accent); }
  .date { font-size: 16px; color: var(--sub); margin-top: 8px; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">오늘</div>
    <div class="time" id="time">--:--</div>
    <div class="date" id="date">-</div>
  </div>
<script>
  var DAYS = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function tick() {
    var d = new Date();
    document.getElementById("time").innerHTML =
      pad(d.getHours()) + ":" + pad(d.getMinutes()) + " <span class='sec'>" + pad(d.getSeconds()) + "</span>";
    document.getElementById("date").textContent =
      d.getFullYear() + "년 " + (d.getMonth() + 1) + "월 " + d.getDate() + "일 " + DAYS[d.getDay()];
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
