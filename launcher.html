<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Launcher</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1f1f1f; --sub: #787774;
    --tile: #ffffff; --line: #ececea; --hover: #f4f4f2;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #191919; --fg: #ececec; --sub: #9b9b9b;
      --tile: #232323; --line: #333; --hover: #2c2c2c; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    padding: 12px 8px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 16px 8px;
    justify-items: center;
  }
  a.app { text-decoration: none; color: var(--fg); text-align: center; width: 96px; }
  .icon {
    width: 80px; height: 80px; margin: 0 auto 8px;
    border-radius: 16px; overflow: hidden;
    background: var(--tile); border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .icon.pad img { width: 62%; height: 62%; object-fit: contain; }
  a.app:hover .icon { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,.12); }
  .name {
    font-size: 12px; line-height: 1.25; color: var(--fg);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 96px;
  }
</style>
</head>
<body>
  <div class="grid" id="grid"></div>
<script>
  // launcher.html?set=biz  (launcher.json의 세트 키)
  var SET = new URLSearchParams(location.search).get("set") || "biz";
  fetch("launcher.json?v=" + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(cfg){
      var items = cfg[SET] || [];
      document.getElementById("grid").innerHTML = items.map(function(it){
        var pad = it.pad ? " pad" : "";
        return "<a class='app' href='" + it.url + "' target='_blank' rel='noopener'>" +
          "<div class='icon" + pad + "'><img src='" + it.icon + "' alt='' loading='lazy'></div>" +
          "<div class='name'>" + it.name + "</div></a>";
      }).join("");
    })
    .catch(function(){ document.body.textContent = "launcher.json 로드 실패"; });
</script>
</body>
</html>
