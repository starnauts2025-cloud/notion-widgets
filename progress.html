<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Progress</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1f1f1f; --sub: #787774; --track: #ededec;
    --c1: #2e9e5b; --c2: #8d8d8a;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #191919; --fg: #ececec; --sub: #9b9b9b; --track: #2c2c2c; --c1: #4cb573; --c2: #8d8d8a; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .wrap { display: flex; gap: 28px; padding: 14px; }
  .item { text-align: center; }
  .donut { position: relative; width: 110px; height: 110px; }
  .donut svg { transform: rotate(-90deg); }
  .donut .pct {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums;
  }
  .name { margin-top: 8px; font-size: 13px; color: var(--sub); }
  circle.track { stroke: var(--track); }
  circle.bar { transition: stroke-dashoffset 0.8s ease; stroke-linecap: round; }
</style>
</head>
<body>
  <div class="wrap" id="wrap"></div>
<script>
  var q = new URLSearchParams(location.search);
  var R = 48, C = 2 * Math.PI * R;
  function donut(label, raw, color) {
    var na = raw === null || raw === "" || raw === "na";
    var pct = na ? 0 : Math.max(0, Math.min(100, parseFloat(raw) || 0));
    var off = C * (1 - pct / 100);
    return '<div class="item"><div class="donut">' +
      '<svg width="110" height="110" viewBox="0 0 110 110">' +
      '<circle class="track" cx="55" cy="55" r="' + R + '" fill="none" stroke-width="10"/>' +
      '<circle class="bar" cx="55" cy="55" r="' + R + '" fill="none" stroke="' + color + '" stroke-width="10" ' +
      'stroke-dasharray="' + C + '" stroke-dashoffset="' + (na ? C : off) + '"/>' +
      '</svg><div class="pct">' + (na ? "&mdash;" : Math.round(pct) + "%") + '</div></div>' +
      '<div class="name">' + label + '</div></div>';
  }
  var c1 = getComputedStyle(document.documentElement).getPropertyValue("--c1").trim();
  var c2 = getComputedStyle(document.documentElement).getPropertyValue("--c2").trim();
  document.getElementById("wrap").innerHTML =
    donut("이번 주", q.get("w"), c1) + donut("지난주", q.get("l"), c2);
</script>
</body>
</html>
